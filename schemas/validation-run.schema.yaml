# Validation Run スキーマ
#
# 実際の業務状態を変更せず、成果物契約やパイプラインのメカニクスを確認する
# ドライラン／実案件パイロットの実施記録。承認・受領・QA合否・公開の代替ではない。

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "pdm-os/schemas/validation-run.schema.yaml"
title: ValidationRun
type: object
required: [id, mode, purpose, started_at, artifact_refs, assumptions]
properties:
  id:
    type: string
    description: 検証実施の識別子。Work Item IDやJira課題キーとは区別する。採番規則はTBD。
  mode:
    type: string
    enum: [dry_run, pilot]
  purpose:
    type: string
  started_at:
    type: string
    format: date-time
  completed_at:
    type: string
    format: date-time
  artifact_refs:
    type: array
    minItems: 1
    items:
      type: object
      required: [artifact_type, ref]
      properties:
        artifact_type:
          type: string
          enum: [requirement, knowledge_pack, specification, wireflow, jira_task_draft, acceptance_report, qa_request, qa_result, release_note]
        ref:
          type: string
  assumptions:
    type: array
    description: 検証だけのために置く前提。実際の承認・状態・送付・公開を変更しない。
    items:
      type: object
      required: [id, statement, applies_to, actual_record_ref]
      properties:
        id:
          type: string
        statement:
          type: string
        applies_to:
          type: array
          minItems: 1
          items:
            type: string
        actual_record_ref:
          type: string
          description: 実際の状態・判断を示す記録への参照。矛盾を隠さないために残す。
  findings:
    type: array
    items:
      type: string

# 未確定事項 (TBD): 検証実施IDの採番規則、Markdownテンプレートとの機械検証方法。
