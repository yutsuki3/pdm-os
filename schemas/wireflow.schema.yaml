# Wireflow スキーマ
# templates/wireflow.md に対応する構造。正式ツールはFigma。画面一覧・詳細遷移の正本はFigmaであり、
# このスキーマはFigmaへの参照と概要のみを保持する（二重管理を避けるため screens/transitions は持たない）。

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "pdm-os/schemas/wireflow.schema.yaml"
title: Wireflow
type: object
required: [specification_id, figma_url]
properties:
  specification_id:
    type: string
  figma_url:
    type: string
    description: 対応するFigmaファイル・フレームへの参照。画面一覧・詳細遷移の正本はこちら。
  summary:
    type: string
    description: このワイヤーフローが対象とする範囲・目的の概要。
  review_notes:
    type: array
    items:
      type: string
    description: 仕様書との整合性確認、分岐条件等でレビュー時に議論が必要な点。

# 未確定事項 (TBD): なし。
