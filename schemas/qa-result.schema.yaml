# QA Result スキーマ
# QAチームから受領した合否情報を参照するための最小構造。
# QA結果の正本は、QAチームが送付したチャットメッセージ（Slack等）。result_refにそのメッセージへのリンクを記録する。

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "pdm-os/schemas/qa-result.schema.yaml"
title: QaResult
type: object
required: [work_item_id, outcome, result_ref]
properties:
  work_item_id:
    type: string
  outcome:
    type: string
    enum: [passed, failed]
  result_ref:
    type: string
    description: QAチームが送付したチャットメッセージ（Slack等）へのリンク。この参照先が正本。
  completed_at:
    type: string
    format: date-time
  reported_by:
    type: string
  defects_or_findings_refs:
    type: array
    items:
      type: string
  notes:
    type: string

