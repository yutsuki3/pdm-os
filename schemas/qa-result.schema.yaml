# QA Result スキーマ
# QAチームから受領した合否情報を参照するための最小構造。
# QA結果の正式な正本システム・テンプレート・記録主体は未決定のため、このスキーマは提案である。

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "pdm-os/schemas/qa-result.schema.yaml"
title: QaResult
type: object
required: [work_item_id, outcome, result_ref]
properties:
  work_item_id:
    type: string
  outcome:
    type: string
    enum: [passed, failed]
  result_ref:
    type: string
    description: QAチームの正式な結果記録を辿る参照。正本システムはTBD。
  completed_at:
    type: string
    format: date-time
  reported_by:
    type: string
  defects_or_findings_refs:
    type: array
    items:
      type: string
  notes:
    type: string

# 未確定事項 (TBD): QA結果の正本、合格/不合格の記録形式、再依頼フロー。
