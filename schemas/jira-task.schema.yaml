# Jira Task Draft スキーマ
# Jira登録前の候補を表す。Jira課題そのものの正本はJira。

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "pdm-os/schemas/jira-task.schema.yaml"
title: JiraTaskDraft
type: object
required: [draft_id, work_item_id, specification_id, title, summary, acceptance_criteria]
properties:
  draft_id:
    type: string
    minLength: 1
    pattern: '^[A-Za-z0-9][A-Za-z0-9._-]*$'
    description: >
      Jira登録前の草稿を識別するID。英数字で始め、英数字・ハイフン・アンダースコア・ドットだけを使用する。
      生成する同一タスク草稿リスト内で一意にする。採番主体・採番規則はTBD。jira_issue_keyとは区別する。
  work_item_id:
    type: string
  specification_id:
    type: string
  title:
    type: string
  issue_type:
    type: string
    description: Jira上の課題タイプ体系はTBD。
  project_key:
    type: string
    description: JiraプロジェクトキーはTBD。
  summary:
    type: string
  acceptance_criteria:
    type: array
    minItems: 1
    items:
      type: object
      required: [text, trace_refs]
      properties:
        text:
          type: string
        trace_refs:
          type: array
          minItems: 1
          description: この条件の根拠への参照。要件IDだけでなくワイヤーフロー画面IDも参照できる。
          items:
            type: object
            required: [source_type, source_ref, item_ref]
            properties:
              source_type:
                type: string
                enum: [specification, wireflow, jira_task_draft, jira_issue]
              source_ref:
                type: string
                description: 仕様書ID、ワイヤーフロー参照、草稿ID、またはJira課題キー。
              item_ref:
                type: string
                description: source_type=specification の場合はFR-001等の要件ID。source_type=wireflow の場合はFigma上のフレーム名/node-id（画面一覧はFigmaが正本のため、このリポジトリ内には独自の画面ID体系を持たない）。
  dependency_refs:
    type: array
    items:
      type: object
      required: [target_type, target_ref]
      properties:
        target_type:
          type: string
          enum: [jira_task_draft, jira_issue]
        target_ref:
          type: string
          description: 草稿段階ではdraft_id、登録後はJira課題キーを指定する。
  estimate:
    type: string
    description: 単位・入力時点はTBD。
  labels_or_components:
    type: array
    items:
      type: string
  assignee_candidate:
    type: string
  jira_issue_key:
    type: string
    description: 登録後にJira正本を参照するためのキー。

# 未確定事項 (TBD): 草稿IDの採番規則、Jiraプロジェクト、課題タイプ、必須フィールド、見積り・アサイン規則。
